<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="btn">
            <span>Load Audio</span>
            <input type="file" id="audioSource">
        </div>
    </div>
    <div onclick='parent.closeapp("audioplayer")' style="position: absolute; top: 10px; left: 10px;" class="btn">Close app</div>
    <style>
        body {
            background: #eee;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-self: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
            color: black;
            font-family: sans-serif;
        }

        * {
            user-select: none;
            -moz-user-select: none;
            -webkit-user-drag: none;
        }

        .btn input {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 150;
            opacity: 0;
        }

        .container {
            z-index: 2;
            position: absolute;
            top: 0;
            background-color: black;
            overflow: hidden;
            width: 100vw;
            height: 50px;
            display: flex;
            justify-content: center;
            align-self: center;
        }

        .btn {
            z-index: 3;
            position: relative;
            border: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            background-color: #bbb;
            border-radius: 125px;
            display: flex;
            justify-content: center;
            align-self: center;
            padding: 5px;
            padding-left: 20px;
            padding-right: 20px;
            overflow: hidden;
        }

        .btn:active {
            background-color: #0077d6;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .btn::before  {
            content: '';
            position: absolute;
            top: 0;
            width: calc(100% - 10px);
            height: 50%;
            background: linear-gradient(rgba(255,255,255,0.5), transparent);
            border-radius: 125px;
        }
        .btn::after  {
            content: '';
            position: absolute;
            border-radius: 100% 100% 0 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.5));
            bottom: 0;
            filter: blur(2px);
        }

        .container::before {
            width: 100vw;
            content: '';
            height: 50%;
            top: 0;
            background: linear-gradient(#fff, #bbb);
            position: absolute;
        }
        .container::after {
            width: 100vw;
            content: '';
            height: 50%;
            bottom: 0;
            background: linear-gradient(#aaa, #888);
            position: absolute;
        }
    </style>
    <audio src="" id="audio"></audio>
    <script>
        const audio = document.getElementById("audio");
        const input = document.getElementById("audioSource");

        input.addEventListener("change", (e) => {
            const file = input.files[0];

            if(!file) return;

            const url = URL.createObjectURL(file);

            audio.src = url;
            audio.play();
        });
    </script>
</body>
</html>
