<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="bottombar">
        <div style="position: absolute; left: 5px; bottom: 5px;" class="btn">Power</div>
        <div onclick="showLibrary()" style="position: absolute; left: 75px; bottom: 5px;" class="btn">Library</div>
    </div>
    <div id="lib" class="menu">
        <span class="menulogo"><span style="color: #0077d6; font-weight: bold; letter-spacing: 2px; margin-right: 5px;">NOVA</span><span>Player</span></span>
        <div onclick="launchapp(audioplayer)" class="option sounded">Launch audio</div>
        <div class="option sounded">Launch movies</div>
        <div class="option sounded">Launch desktop</div>
    </div>
    <style>
        body {
            background: url("bg.jpg") no-repeat center;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }

        .menulogo {
            position: absolute;
            top: 35px;
        }

        @keyframes app {
            0% {
                opacity: 0;
                transform: scale(0.8);
                border-radius: 250px;
            }
        }

        .app {
            width: 100vw;
            height: 100vh;
            background-color: black;
            position: absolute;
            z-index: 1500;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: app 0.3s ease;
            overflow: hidden;
            transition: .2s ease;
        }

        .app iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        .option {
            background-color: transparent;
            width: 100%;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .option:hover {
            background-color: #0077d6;
        }

        .menu {
            width: 250px;
            height: 100vh;
            position: absolute;
            z-index: 150;
            background-color: rgba(0, 0, 0, 0.75);
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateX(-100%);
            pointer-events: none;
            transition: 0.2s ease;
            flex-direction: column;
        }

        .menu.active {
            transform: translateX(0);
            pointer-events: all;
        }

        * {
            user-select: none;
            -moz-user-select: none;
            -webkit-user-drag: none;
        }

        .btn {
            font-family: inherit;
            color: white;
            background: linear-gradient(#333, #111);
            padding: 8px;
            border-top: 1px solid #111;
            border-left: 1px solid #111;
            border-radius: 5px;
            border-bottom: 1px solid #333;
            border-right: 1px solid #333;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.1s ease;
        }

        .btn::before {
            width: 100%;
            height: 50%;
            position: absolute;
            top: 0;
            content: '';
            background-color: rgba(255,255,255,0.1);
            filter: blur(1px);
            pointer-events: none;
        }

        .btn::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.75);
            pointer-events: none;
        }

        .btn:hover {
            border: 1px solid #2299ff;
            box-shadow: 0 0 15px #2299ff;
            background: #0077d6;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .bottombar {
            width: 100vw;
            height: 75px;
            background: linear-gradient(#444, #000);
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <script src="script.js"></script>
</body>
</html>
